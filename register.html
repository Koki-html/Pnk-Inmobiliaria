<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formulario de Registro Navegable | UI Moderno</title>
        <link rel="stylesheet" href="css/ColorPalette.css">
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/register.css" />
</head>
<body>

<div class="card">
    <div class="header">
        <h1>📝 Crear cuenta</h1>
        <p>Completa el formulario y navega con TAB / Enter de forma fluida</p>
    </div>
    <div class="form-container">
        <form id="registerForm" novalidate>
            <!-- fila nombre + apellido -->
            <div class="double-row">
                <div class="input-group" id="group-nombre">
                    <label><span>👤 Nombre</span><span class="required-star">*</span></label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Ana" autocomplete="given-name">
                    <div class="error-message"></div>
                </div>
                <div class="input-group" id="group-apellido">
                    <label><span>📛 Apellido</span><span class="required-star">*</span></label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ej: Martínez" autocomplete="family-name">
                    <div class="error-message"></div>
                </div>
            </div>

            <!-- email -->
            <div class="input-group" id="group-email">
                <label><span>📧 Correo electrónico</span><span class="required-star">*</span></label>
                <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" autocomplete="email">
                <div class="error-message"></div>
            </div>

            <!-- contraseña -->
            <div class="input-group" id="group-password">
                <label><span>🔒 Contraseña</span><span class="required-star">*</span></label>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                <div class="error-message"></div>
            </div>

            <!-- confirmar contraseña -->
            <div class="input-group" id="group-confirm">
                <label><span>✅ Confirmar contraseña</span><span class="required-star">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña" autocomplete="off">
                <div class="error-message"></div>
            </div>

            <!-- país (select navegable) -->
            <div class="input-group" id="group-pais">
                <label><span>🌍 País / Región</span><span class="required-star">*</span></label>
                <select id="pais" name="pais">
                    <option value="" disabled selected>-- Selecciona un país --</option>
                    <option value="MX">México</option>
                    <option value="ES">España</option>
                    <option value="AR">Argentina</option>
                    <option value="CO">Colombia</option>
                    <option value="PE">Perú</option>
                    <option value="CL">Chile</option>
                    <option value="US">Estados Unidos</option>
                    <option value="OTRO">Otro</option>
                </select>
                <div class="error-message"></div>
            </div>

            <!-- términos -->
            <div class="input-group terms-group" id="group-terminos">
                <input type="checkbox" id="terminos" name="terminos">
                <label for="terminos">Acepto los <a href="#" id="termsLink">términos y condiciones</a> <span class="required-star">*</span></label>
                <div class="error-message"></div>
            </div>

            <!-- Botones navegables -->
            <div class="buttons">
                <button type="button" class="btn-reset" id="resetBtn">🗑️ Limpiar</button>
                <button type="submit" class="btn-submit" id="submitBtn">✅ Registrarse</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast feedback -->
<div id="toastMsg" class="toast-msg"></div>

<script src="js/darkmode.js"></script>
</body>
</html>
