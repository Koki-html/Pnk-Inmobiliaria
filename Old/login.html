<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PnkLogin</title>

    <!-- Enlaces a hojas de estilo -->
    <link rel="stylesheet" href="css/ColorPalette.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="img/icon/Pnk.ico">
</head>
<body>

    <!-- Enlace de accesibilidad para saltar al contenido principal -->
    <a href="#login-form-container" class="skip-link">Saltar al formulario de acceso</a>

    <div class="login-card" role="main" aria-labelledby="login-heading">
        <div class="card-header">
            <h1 id="login-heading">Bienvenido</h1>
            <p>Ingresa con tu cuenta · Acceso seguro</p>
        </div>

        <div class="card-body" id="login-form-container">
            <form id="loginForm" action="#" method="post" novalidate>
                <!-- Campo de usuario/email navegable -->
                <div class="input-group">
                    <label for="username">
                        <span class="label-icon">👤</span> 
                        Usuario o correo electrónico
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="ejemplo@dominio.com o usuario"
                        autocomplete="username"
                        aria-required="true"
                        aria-label="Nombre de usuario o correo electrónico"
                        required
                    >
                </div>

                <!-- Campo de contraseña -->
                <div class="input-group">
                    <label for="password">
                        <span class="label-icon">🔒</span>
                        Contraseña
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        aria-required="true"
                        aria-label="Contraseña"
                        required
                    >
                </div>

                <!-- Opciones: recordar y olvidé contraseña -->
                <div class="login-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberCheckbox" name="remember">
                        <span>Recordarme</span>
                    </label>
                    <a href="#" id="forgotPasswordLink" class="forgot-link" role="button" aria-label="Recuperar contraseña">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Botón de login -->
                <button type="submit" id="loginButton" class="login-btn" aria-label="Iniciar sesión">
                    Iniciar sesión
                </button>

                <!-- Área de mensajes dinámicos (feedback) -->
                <div id="messageContainer" class="message-area" role="status" aria-live="polite">
                    ✨ Completa tus credenciales
                </div>

                <!-- Enlace a registro (simulado) -->
                <div class="register-prompt">
                    ¿No tienes una cuenta?
                    <a href="#" id="registerLink" class="register-link" aria-label="Crear cuenta nueva">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/darkmode.js"></script>
    <script src="js/login.js"></script>
    </script>
</body>
</html>
